name: YieldTrust Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    name: Install, Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Static analysis ───────────────────────────────────────────────────
      - name: Lint (ESLint)
        run: npm run lint

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Run tests
        run: npm test
